<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia | Loreto Ingeniería</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary-blue: #263fa4;
            --light-blue: #eef2ff;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-green: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            z-index: 50;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; cursor: pointer; color: var(--text-main); }
        .header-title { margin: 0; font-size: 15px; font-weight: 700; color: var(--primary-blue); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-initial { width: 35px; height: 35px; border-radius: 50%; background-color: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border-color); overflow-y: auto; transition: transform 0.3s ease; display: flex; flex-direction: column; }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: calc(100vh - 60px); transform: translateX(-100%); z-index: 40; }
            .sidebar.open { transform: translateX(0); }
            .header-title { display: none; }
        }

        /* --- ESTILOS DEL MENÚ DINÁMICO --- */
        .sidebar-nav { padding: 15px 10px; }
        .sidebar-section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .sidebar-section:last-child { border-bottom: none; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 15px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 500; border-radius: 8px; margin-bottom: 2px; transition: all 0.2s; }
        .nav-item:hover { background-color: var(--bg-color); }
        .nav-item.active { background-color: var(--light-blue); color: var(--primary-blue); font-weight: 700; border-left: 4px solid var(--primary-blue); }
        .nav-item.active i { color: var(--primary-blue); }

        /* --- CONTENIDO ASISTENCIA --- */
        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; justify-content: center; }
        
        .asistencia-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        /* --- BOTONES Y HORAS --- */
        .grid-botones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-check {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px 10px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-blue);
            color: white;
            font-weight: 700;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-check:hover { background-color: #1a2a6e; transform: translateY(-2px); }
        
        .btn-check:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Cajita que muestra la hora debajo del botón */
        .time-display {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary-blue);
            text-align: center;
            min-height: 15px; /* Mantiene el espacio aunque esté vacío */
        }

        /* --- MODAL PERSONALIZADO --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;
        }
        
        .modal-content {
            background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 320px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .modal-content p { margin: 0 0 20px 0; font-size: 15px; color: var(--text-main); font-weight: 600; }
        .btn-modal {
            background: var(--primary-blue); color: white; border: none; padding: 10px 25px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;
        }
        .btn-modal:hover { background: #1a2a6e; }

        .nota-advertencia {
            margin-top: 25px;
            font-size: 12px;
            color: #b91c1c; 
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="toggle-menu"><i data-lucide="menu"></i></button>
            <img src="https://i.ibb.co/mC4fV6TG/LOGOTIPO-2.jpg" alt="Logo" style="height: 35px; width: auto; object-fit: contain;">
            <h1 class="header-title">Módulo de Asistencia</h1>
        </div>
        <div class="header-right">
            <div class="user-initial" id="user-initial">U</div>
            <img src="https://i.ibb.co/8Lk54Gkb/LOGOTIPO-1.jpg" alt="User" height="35" style="border-radius:4px;">
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="content">
            <div class="asistencia-card">
                <h2 style="margin-top:0; color: var(--primary-blue); text-align:center;">Registro de Asistencia</h2>
                
                <div class="form-group">
                    <label>Sitio / Obra</label>
                    <select class="form-control" id="sitio">
                        <option value="">Selecciona ubicación...</option>
                        <option value="Oficina Central">Oficina Central</option>
                        <option value="Obra Reforma">Obra Reforma</option>
                        <option value="Obra Santa Fe">Obra Santa Fe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Fecha</label>
                    <input type="text" class="form-control" id="fecha-hoy" readonly>
                </div>

                <div class="grid-botones">
                    <div class="btn-wrapper">
                        <button id="btn-Entrada" class="btn-check" onclick="marcar('Entrada', this)"><i data-lucide="log-in"></i> Entrada</button>
                        <div id="time-Entrada" class="time-display"></div>
                    </div>
                    
                    <div class="btn-wrapper">
                        <button id="btn-Salida" class="btn-check" onclick="marcar('Salida', this)"><i data-lucide="log-out"></i> Salida</button>
                        <div id="time-Salida" class="time-display"></div>
                    </div>
                    
                    <div class="btn-wrapper">
                        <button id="btn-Entrada-Tiempo-Extra" class="btn-check" onclick="marcar('Entrada Tiempo Extra', this)"><i data-lucide="clock-9"></i> Entrada Tiempo Extra</button>
                        <div id="time-Entrada-Tiempo-Extra" class="time-display"></div>
                    </div>
                    
                    <div class="btn-wrapper">
                        <button id="btn-Salida-Tiempo-Extra" class="btn-check" onclick="marcar('Salida Tiempo Extra', this)"><i data-lucide="clock-12"></i> Salida Tiempo Extra</button>
                        <div id="time-Salida-Tiempo-Extra" class="time-display"></div>
                    </div>
                </div>

                <div class="nota-advertencia">
                    ⚠️ Tienes 15 minutos de tolerancia en tu entrada, evita sanciones y recuerda que la asistencia está geolocalizada.
                </div>
            </div>
        </main>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <i data-lucide="alert-circle" style="color: #ef4444; width: 48px; height: 48px; margin-bottom: 15px;"></i>
            <p id="customAlertMessage">Mensaje de alerta</p>
            <button class="btn-modal" onclick="cerrarAlerta()">Aceptar</button>
        </div>
    </div>

    <div id="successAlert" class="modal-overlay">
        <div class="modal-content">
            <i data-lucide="check-circle" style="color: #10b981; width: 48px; height: 48px; margin-bottom: 15px;"></i>
            <p id="successAlertMessage">Registro guardado exitosamente.</p>
            <button class="btn-modal" style="background:#10b981;" onclick="cerrarSuccess()">Aceptar</button>
        </div>
    </div>

    <script>
        // Funciones para los Modales
        function mostrarAlerta(mensaje) {
            document.getElementById('customAlertMessage').innerText = mensaje;
            document.getElementById('customAlert').style.display = 'flex';
        }
        function cerrarAlerta() { document.getElementById('customAlert').style.display = 'none'; }
        
        function mostrarExito(mensaje) {
            document.getElementById('successAlertMessage').innerText = mensaje;
            document.getElementById('successAlert').style.display = 'flex';
        }
        function cerrarSuccess() { document.getElementById('successAlert').style.display = 'none'; }

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDkwUT5MrsJV2IMp18-RT20829M9c3-zfk",
            authDomain: "loreto-ingenieria.firebaseapp.com",
            projectId: "loreto-ingenieria",
            storageBucket: "loreto-ingenieria.firebasestorage.app",
            messagingSenderId: "873434501512",
            appId: "1:873434501512:web:963903379a5e72cb092a3d"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ==========================================
        // 1. CARGAR MENÚ DINÁMICO
        // ==========================================
        fetch('menu.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('sidebar').innerHTML = html;
                lucide.createIcons();
                const linkInicio = document.getElementById('link-inicio');
                if(linkInicio) linkInicio.classList.remove('active');
                const linkAsistencia = document.getElementById('link-asistencia');
                if(linkAsistencia) linkAsistencia.classList.add('active');
            });

        // ==========================================
        // 2. PONER FECHA DE HOY
        // ==========================================
        const hoy = new Date();
        const fechaString = hoy.toLocaleDateString('es-MX', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });
        document.getElementById('fecha-hoy').value = fechaString;

        // ==========================================
        // 3. REVISAR EN FIREBASE SI YA CHECÓ HOY
        // ==========================================
        const idUsuario = localStorage.getItem('usuario');
        const nombreUsuario = localStorage.getItem('nombre') || 'Usuario Desconocido';

        if (idUsuario) {
            db.collection("registro_asistencia")
                .where("usuario_id", "==", idUsuario)
                .where("fecha", "==", fechaString)
                .get()
                .then((querySnapshot) => {
                    querySnapshot.forEach((doc) => {
                        const tipo = doc.data().tipo_registro;
                        const hora = doc.data().hora; // Recuperamos la hora guardada
                        
                        const idBase = tipo.replace(/ /g, "-");
                        const idBoton = "btn-" + idBase;
                        const idTime = "time-" + idBase;
                        
                        const btn = document.getElementById(idBoton);
                        const timeDisplay = document.getElementById(idTime);
                        
                        if(btn) {
                            btn.disabled = true;
                            btn.innerHTML = `<i data-lucide="check-circle"></i> REGISTRADO`;
                        }
                        if(timeDisplay && hora) {
                            timeDisplay.innerText = `Checada: ${hora}`;
                        }
                    });
                    lucide.createIcons();
                })
                .catch((error) => console.error("Error al cargar asistencias previas:", error));
        }

        // ==========================================
        // 4. LÓGICA DE REGISTRO
        // ==========================================
        function marcar(tipo, boton) {
            const sitio = document.getElementById('sitio').value;
            if(!sitio) {
                mostrarAlerta("Por favor, selecciona primero el Sitio/Obra en el que te encuentras.");
                return;
            }

            boton.disabled = true;
            const textoOriginal = boton.innerHTML;
            boton.innerHTML = "Guardando...";

            const ahora = new Date();
            // Formato de hora, ej: 08:30 a.m.
            const horaString = ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: true });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lon = pos.coords.longitude.toFixed(6);
                    const coordsTexto = `${lat}, ${lon}`;

                    try {
                        const docId = `ASISTENCIA_${idUsuario}_${Date.now()}`;
                        await db.collection("registro_asistencia").doc(docId).set({
                            id_registro: docId,
                            usuario_id: idUsuario,
                            nombre: nombreUsuario,
                            sitio_obra: sitio,
                            tipo_registro: tipo,
                            fecha: fechaString,
                            hora: horaString,
                            coordenadas: coordsTexto,
                            latitud: lat,
                            longitud: lon,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        // Mostrar la hora justo debajo del botón
                        const idTime = "time-" + tipo.replace(/ /g, "-");
                        document.getElementById(idTime).innerText = `Checada: ${horaString}`;

                        // Alerta visual verde
                        mostrarExito(`Has registrado tu ${tipo} con éxito a las ${horaString}`);

                        // Dejar el botón inactivo
                        boton.innerHTML = `<i data-lucide="check-circle"></i> Registrado`;
                        lucide.createIcons();

                    } catch (error) {
                        console.error("Error guardando en Firebase:", error);
                        mostrarAlerta("Error al guardar. Revisa tu conexión a internet.");
                        boton.disabled = false;
                        boton.innerHTML = textoOriginal;
                    }

                }, (err) => {
                    mostrarAlerta("Es obligatorio permitir el acceso al GPS para registrar la asistencia. Revisa los permisos de tu navegador o celular.");
                    boton.disabled = false;
                    boton.innerHTML = textoOriginal;
                });
            } else {
                mostrarAlerta("GPS no soportado en este dispositivo/navegador.");
                boton.disabled = false;
                boton.innerHTML = textoOriginal;
            }
        }

        // Hamburguesa móvil
        document.getElementById('toggle-menu').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        if (nombreUsuario !== 'Usuario Desconocido') {
            document.getElementById('user-initial').innerText = nombreUsuario.charAt(0).toUpperCase();
        }

        lucide.createIcons();
    </script>
</body>
</html>
