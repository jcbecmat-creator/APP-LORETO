<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Loreto Ingeniería</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #263fa4; /* Fondo azul original */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            /* Esto garantiza un margen azul exacto en los lados */
            padding: 18px; 
            box-sizing: border-box;
        }

        .login-box {
            background-color: #ffffff;
            border-radius: 12px;
            /* El padding superior (18px) es EXACTAMENTE IGUAL al margen azul de los lados */
            padding: 18px 22px 25px 22px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            /* Toma todo el espacio disponible respetando el margen azul del body */
            width: 100%; 
            max-width: 500px; 
            text-align: center;
            box-sizing: border-box;
        }

        .main-logo {
            width: 100px; 
            height: auto;
            /* Margen en 0 para que baje y respete los 18px exactos de la caja blanca */
            margin-top: 0px; 
            margin-bottom: 18px; 
        }

        .company-name {
            font-size: 12.5pt; 
            color: #263fa4;
            font-weight: bold;
            margin-bottom: 20px; 
            line-height: 1.4;
        }

        /* Clase para forzar que el texto no salte de línea */
        .no-wrap {
            white-space: nowrap;
        }

        .welcome-text {
            font-size: 16px; 
            color: #333333;
            margin-bottom: 25px; 
        }

        .input-group {
            position: relative;
            margin-bottom: 20px; 
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px; 
            color: #555;
            margin-bottom: 8px; 
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-group input {
            width: 100%;
            /* Cajas largas/altas mantenidas */
            padding: 18px 16px 18px 45px; 
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px; 
            background-color: #f9f9f9;
        }

        .input-group .field-icon {
            position: absolute;
            left: 14px; 
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 16px; 
        }

        .input-group .toggle-password {
            position: absolute;
            right: 14px; 
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer;
            font-size: 16px; 
        }

        .login-button {
            background-color: #263fa4;
            color: #ffffff;
            border: none;
            padding: 18px; 
            border-radius: 6px;
            font-size: 17px; 
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            margin-bottom: 5px; 
            transition: background-color 0.3s;
        }
        
        .login-button:hover {
            background-color: #1a2a6e;
        }
        
        .login-button:disabled {
            background-color: #6c7ebf;
            cursor: not-allowed;
        }

        #mensaje {
            margin-bottom: 5px;
            font-size: 13px; 
            font-weight: bold;
            min-height: 18px; 
        }

        .bottom-logo {
            width: 212px; 
            height: auto;
            margin-top: 0;
        }

        .copyright {
            font-size: 10px; 
            color: #ffffff;
            margin-top: 25px; 
            text-align: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://i.ibb.co/8Lk54Gkb/LOGOTIPO-1.jpg" alt="Logo Loreto" class="main-logo">
        
        <div class="company-name">
            <span class="no-wrap">Loreto Ingeniería Construcción</span><br>
            <span class="no-wrap">Edificación y Remodelación</span>
        </div>
        
        <div class="welcome-text">Bienvenido</div>

        <div class="input-group">
            <label for="username">Usuario</label>
            <div class="input-wrapper">
                <i class="fas fa-id-badge field-icon"></i>
                <input type="text" id="username" placeholder="ID de Usuario">
            </div>
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
                <i class="fas fa-lock field-icon"></i>
                <input type="password" id="password" placeholder="••••••••">
                <i class="fas fa-eye toggle-password" id="togglePasswordIcon"></i>
            </div>
        </div>

        <button type="button" class="login-button" id="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>
        
        <div id="mensaje"></div>

        <img src="https://i.ibb.co/mC4fV6TG/LOGOTIPO-2.jpg" alt="Maquinaria" class="bottom-logo">
    </div>

    <div class="copyright">
        © 2026 LORETO INGENIERÍA. TODOS LOS DERECHOS RESERVADOS.
    </div>

    <script>
        // Lógica para mostrar/ocultar contraseña
        const togglePasswordIcon = document.getElementById('togglePasswordIcon');
        const passwordField = document.getElementById('password');

        togglePasswordIcon.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Conexión con el backend de Google Sheets
        function iniciarSesion() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            var btnLogin = document.getElementById("btn-login");
            var mensajeDiv = document.getElementById("mensaje");
            
            if (!user || !pass) {
                mensajeDiv.innerText = "Ingresa tus credenciales";
                mensajeDiv.style.color = "#d93025";
                return;
            }

            btnLogin.innerText = "Validando...";
            btnLogin.disabled = true;
            mensajeDiv.innerText = "";
            
            var scriptURL = "https://script.google.com/macros/s/AKfycbxA8-SPAsg97_ns7FdqXqw6LLt2-bGafvzO6cL9CsSbx26e9Oz59CxKEemmPK1Gzik/exec";

            var data = new URLSearchParams();
            data.append('usuario', user);
            data.append('contrasena', pass);

            fetch(scriptURL, {
                method: 'POST',
                body: data
            })
            .then(response => response.json())
            .then(respuesta => {
                btnLogin.innerText = "Iniciar sesión";
                btnLogin.disabled = false;

                if(respuesta.success) {
                    mensajeDiv.style.color = "#188038";
                    mensajeDiv.innerText = "¡Bienvenido! Nivel: " + respuesta.privilegio;
                    // Redirección o carga de app aquí
                } else {
                    mensajeDiv.style.color = "#d93025";
                    mensajeDiv.innerText = respuesta.mensaje;
                }
            })
            .catch(error => {
                btnLogin.innerText = "Iniciar sesión";
                btnLogin.disabled = false;
                mensajeDiv.style.color = "#d93025";
                mensajeDiv.innerText = "Error de red. Reintenta.";
                console.error('Error:', error);
            });
        }
    </script>

</body>
</html>
